/* ═══ PLAYER ═══ */
function Player({session,onClose}){
  const [on,setOn]=useState(false);
  const [prog,setProg]=useState(0);
  const aRef=useRef(null);
  const prevSessionId=useRef(null);

  /* event listeners for timeupdate & ended */
  useEffect(()=>{const a=aRef.current;if(!a)return;const t=()=>{if(a.duration)setProg((a.currentTime/a.duration)*100);};const e=()=>{setOn(false);setProg(0);};a.addEventListener("timeupdate",t);a.addEventListener("ended",e);return()=>{a.removeEventListener("timeupdate",t);a.removeEventListener("ended",e);};},[session]);

  /* auto-play when session changes */
  useEffect(()=>{
    if(session.id===prevSessionId.current)return;
    prevSessionId.current=session.id;
    setProg(0);
    const a=aRef.current;
    if(a&&session.src){
      a.load();
      a.play().then(()=>setOn(true)).catch(()=>setOn(false));
    } else {
      setOn(true);
    }
  },[session]);

  const toggle=()=>{const a=aRef.current;if(a&&a.src){if(on)a.pause();else a.play().catch(()=>{});setOn(!on);return;}setOn(!on);};
  const seek=e=>{const a=aRef.current;if(!a||!a.duration)return;const r=e.currentTarget.getBoundingClientRect();a.currentTime=((e.clientX-r.left)/r.width)*a.duration;};
  useEffect(()=>{if(session.src||!on)return;const iv=setInterval(()=>setProg(p=>p>=100?(setOn(false),0):p+0.25),120);return()=>clearInterval(iv);},[on,session.src]);

  return (
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(255,255,255,.92)",backdropFilter:"blur(20px)",padding:"16px 28px",display:"flex",alignItems:"center",gap:16,zIndex:200,borderTop:`1.5px solid ${P.blush}`,animation:"slideUp .35s cubic-bezier(.16,1,.3,1)",boxShadow:"0 -8px 32px rgba(0,0,0,.06)"}}>
      {session.src&&<audio ref={aRef} src={session.src} preload="auto"/>}
      <button onClick={toggle} style={{width:52,height:52,borderRadius:"50%",border:"none",background:`linear-gradient(135deg,${P.peach},${P.coral})`,color:"#fff",fontSize:18,fontWeight:900,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",transition:"transform .15s",boxShadow:"0 6px 20px rgba(224,122,107,.3)"}}
        onMouseEnter={e=>e.currentTarget.style.transform="scale(1.08)"} onMouseLeave={e=>e.currentTarget.style.transform=""}>
        {on?"⏸":"▶"}
      </button>
      <div style={{flex:1,minWidth:0}}>
        <div style={{color:P.deep,fontSize:15,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{session.title}</div>
        <div onClick={seek} style={{marginTop:8,height:5,background:P.blush,borderRadius:4,cursor:"pointer",overflow:"hidden"}}>
          <div style={{width:`${prog}%`,height:"100%",background:`linear-gradient(90deg,${P.peach},${P.coral})`,borderRadius:4,transition:"width .12s linear"}}/>
        </div>
      </div>
      <button onClick={onClose} style={{background:"none",border:"none",color:P.muted,fontSize:26,cursor:"pointer",padding:4,lineHeight:1}}>✕</button>
    </div>
  );
}

                <div style={{position:"absolute",top:-30,right:-30,width:140,height:140,borderRadius:"50%",background:it.color,opacity:.08}}/>
                <div style={{position:"absolute",bottom:-20,left:-20,width:100,height:100,borderRadius:"50%",background:it.color,opacity:.06}}/>
                <span style={{fontFamily:"'DM Serif Display',serif",fontSize:52,color:it.color,display:"block",marginBottom:20,fontStyle:"italic",opacity:.7}}>{it.icon}</span>
                <div style={{fontFamily:"'DM Serif Display',serif",fontSize:26,fontWeight:400,marginBottom:10,color:P.deep}}>{it.t}</div>
                <div style={{fontSize:14,color:P.muted,fontWeight:500,lineHeight:1.6,maxWidth:260,margin:"0 auto"}}>{it.s}</div>
                <div style={{marginTop:24,display:"inline-flex",alignItems:"center",gap:8,background:"#fff",padding:"10px 24px",borderRadius:14,fontSize:14,fontWeight:700,color:P.coral,boxShadow:"0 2px 8px rgba(0,0,0,.05)"}}>Prozkoumat →</div>
              </button></A>
            ))}
          </div>

          <A i={4} d={.18}><div style={{textAlign:"center",marginTop:64}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:14,marginBottom:10}}>
              <div style={{width:40,height:1,background:`linear-gradient(90deg,transparent,${P.blush})`}}/><span style={{fontSize:11,color:P.blush}}>✦</span><div style={{width:40,height:1,background:`linear-gradient(90deg,${P.blush},transparent)`}}/>
            </div>
            <p style={{fontSize:13,color:P.muted,fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",opacity:.6}}>S láskou připravila vaše jóga instruktorka</p>
          </div></A>
        </>}

        {/* ═══ MEDITATION CATEGORIES ═══ */}
        {view==="med"&&<>
          <A><div style={{textAlign:"center",marginBottom:44}}>
            <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:"clamp(32px,5vw,52px)",fontWeight:400,fontStyle:"italic",marginBottom:10,color:P.deep}}>Meditace</h2>
            <p style={{color:P.muted,fontSize:16,maxWidth:400,margin:"0 auto",fontWeight:500}}>Vyberte druh, který vám právě sedí.</p>
          </div></A>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:18,maxWidth:800,margin:"0 auto"}}>
            {CATEGORIES.map((c,i)=>(
              <A key={c.id} i={i} d={.06}><button onClick={()=>go("ms",c)} style={{width:"100%",background:bgMap(c.color),border:"1.5px solid rgba(255,255,255,.7)",borderRadius:24,padding:"32px 24px",cursor:"pointer",textAlign:"center",transition:"all .3s cubic-bezier(.16,1,.3,1)",minHeight:180,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",boxShadow:`0 6px 24px ${c.color}20, inset 0 1px 0 rgba(255,255,255,.5)`}}
                onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-6px)";e.currentTarget.style.boxShadow=`0 16px 40px ${c.color}30`;}}
                onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow=`0 6px 24px ${c.color}20, inset 0 1px 0 rgba(255,255,255,.5)`;}}>
                <span style={{fontSize:40,marginBottom:14}}>{c.icon}</span>
                <div style={{fontFamily:"'DM Serif Display',serif",fontSize:20,fontWeight:400,marginBottom:4,color:P.deep}}>{c.title}</div>
                <div style={{fontSize:13,color:P.muted,fontWeight:500}}>{c.subtitle}</div>
                <div style={{marginTop:14,fontSize:11,color:c.color,fontWeight:700,letterSpacing:".06em",textTransform:"uppercase",background:"#fff",padding:"4px 14px",borderRadius:8}}>{c.sessions.length} nahrávky</div>
              </button></A>
            ))}
          </div>
        </>}

        {/* ═══ MEDITATION SESSIONS ═══ */}
        {view==="ms"&&cat&&<>
          <A><div style={{textAlign:"center",marginBottom:40}}>
            <span style={{fontSize:48,display:"block",marginBottom:14}}>{cat.icon}</span>
            <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:"clamp(30px,5vw,44px)",fontWeight:400,fontStyle:"italic",margin:0,color:P.deep}}>{cat.title}</h2>
            <p style={{color:P.muted,fontSize:15,marginTop:8,fontWeight:500}}>{cat.subtitle}</p>
          </div></A>
          <div style={{maxWidth:660,margin:"0 auto",display:"flex",flexDirection:"column",gap:12}}>
            {cat.sessions.map((s,i)=>(
              <A key={s.id} i={i} d={.06}><div onClick={()=>setPlaying({...s,icon:cat.icon})} style={{background:"#fff",border:`1.5px solid ${playing?.id===s.id?cat.color:P.blush}`,borderRadius:18,padding:"22px 26px",cursor:"pointer",display:"flex",alignItems:"center",gap:18,transition:"all .25s",boxShadow:playing?.id===s.id?`0 6px 24px ${cat.color}20`:"0 2px 10px rgba(0,0,0,.04)"}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=cat.color;e.currentTarget.style.boxShadow=`0 8px 28px ${cat.color}18`;e.currentTarget.style.transform="translateY(-2px)";}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor=playing?.id===s.id?cat.color:P.blush;e.currentTarget.style.boxShadow=playing?.id===s.id?`0 6px 24px ${cat.color}20`:"0 2px 10px rgba(0,0,0,.04)";e.currentTarget.style.transform="";}}>
                <div style={{width:50,height:50,borderRadius:"50%",background:cat.color+"18",display:"flex",alignItems:"center",justifyContent:"center",color:cat.color,fontSize:16,flexShrink:0,fontWeight:900}}>▶</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:16,fontWeight:700,color:P.deep}}>{s.title}</div>
                  <div style={{fontSize:13,color:P.muted,marginTop:4,fontWeight:500}}>{s.desc}</div>
                </div>
                <span style={{fontSize:13,color:P.muted,marginRight:10,flexShrink:0,fontWeight:600,opacity:.6}}>{s.duration}</span>
                <DlBtn onClick={()=>setDlItem({...s,icon:cat.icon})}/>
              </div></A>
            ))}
          </div>
        </>}

        {/* ═══ TALES AGE ═══ */}
        {view==="tales"&&<>
          <A><div style={{textAlign:"center",marginBottom:44}}>
            <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:"clamp(32px,5vw,52px)",fontWeight:400,fontStyle:"italic",marginBottom:10,color:P.deep}}>Pohádky na dobrou noc</h2>
            <p style={{color:P.muted,fontSize:16,maxWidth:380,margin:"0 auto",fontWeight:500}}>Kolik je vašemu malému posluchači?</p>
          </div></A>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:18,maxWidth:480,margin:"0 auto"}}>
            {[2,3,4].map((a,i)=>{
              const cs=[P.peach,P.sage,P.lavender];const gs=["linear-gradient(160deg,#FDF0E8,#F9E4D8)","linear-gradient(160deg,#E8F2E8,#DCEADC)","linear-gradient(160deg,#F0E8F5,#E8DDF2)"];const ics=["🧸","🦋","🌟"];
              return <A key={a} i={i} d={.08}><button onClick={()=>go("fs",a)} style={{width:"100%",aspectRatio:"1/1.2",background:gs[i],border:"1.5px solid rgba(255,255,255,.7)",borderRadius:24,padding:20,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10,transition:"all .3s cubic-bezier(.16,1,.3,1)",boxShadow:`0 6px 24px ${cs[i]}20, inset 0 1px 0 rgba(255,255,255,.5)`}}
                onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-7px) scale(1.02)";e.currentTarget.style.boxShadow=`0 20px 48px ${cs[i]}30`;}}
                onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow=`0 6px 24px ${cs[i]}20, inset 0 1px 0 rgba(255,255,255,.5)`;}}>
                <span style={{fontSize:44}}>{ics[i]}</span>
                <span style={{fontFamily:"'DM Serif Display',serif",fontSize:40,fontWeight:400,color:P.deep}}>{a}</span>
                <span style={{fontSize:14,color:P.muted,fontWeight:600}}>roky</span>
              </button></A>;
            })}
          </div>
        </>}

        {/* ═══ TALE SESSIONS ═══ */}
        {view==="fs"&&age&&<>
          <A><div style={{textAlign:"center",marginBottom:40}}>
            <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:"clamp(30px,5vw,44px)",fontWeight:400,fontStyle:"italic",margin:0,color:P.deep}}>Pohádky pro {age}leté</h2>
            <p style={{color:P.muted,fontSize:15,marginTop:8,fontWeight:500}}>{TALES[age].length} pohádek k poslechu</p>
          </div></A>
          <div style={{maxWidth:660,margin:"0 auto",display:"flex",flexDirection:"column",gap:12}}>
            {TALES[age].map((t,i)=>(
              <A key={t.id} i={i} d={.05}><div onClick={()=>setPlaying(t)} style={{background:"#fff",border:`1.5px solid ${playing?.id===t.id?P.sage:P.blush}`,borderRadius:18,padding:"22px 26px",cursor:"pointer",display:"flex",alignItems:"center",gap:18,transition:"all .25s",boxShadow:playing?.id===t.id?`0 6px 24px ${P.sage}20`:"0 2px 10px rgba(0,0,0,.04)"}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=P.sage;e.currentTarget.style.boxShadow=`0 8px 28px ${P.sage}18`;e.currentTarget.style.transform="translateY(-2px)";}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor=playing?.id===t.id?P.sage:P.blush;e.currentTarget.style.boxShadow=playing?.id===t.id?`0 6px 24px ${P.sage}20`:"0 2px 10px rgba(0,0,0,.04)";e.currentTarget.style.transform="";}}>
                <span style={{fontSize:38}}>{t.icon}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:16,fontWeight:700,color:P.deep}}>{t.title}</div>
                  <div style={{fontSize:13,color:P.muted,marginTop:3,fontWeight:500}}>{t.duration}</div>
                </div>
                <DlBtn onClick={()=>setDlItem(t)}/>
              </div></A>
            ))}
          </div>
        </>}

      </div>
      {playing&&<Player session={playing} onClose={()=>setPlaying(null)}/>}
      {dlItem&&<Modal item={dlItem} onClose={()=>setDlItem(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
