<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ty a Tvé – Meditace & Pohádky</title>
<meta name="description" content="Prostor pro vnitřní klid. Meditace pro dospělé, pohádky pro nejmenší."/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:#1A1614;color:#E8E0D4;font-family:'Jost',sans-serif;overflow-x:hidden;font-weight:400}
#root{min-height:100vh}
::selection{background:rgba(196,163,90,.3);color:#fff}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.9) translateY(14px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes modalBg{from{opacity:0}to{opacity:1}}
@keyframes spinSlow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes spinReverse{from{transform:rotate(360deg)}to{transform:rotate(0deg)}}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.08);opacity:1}}
@keyframes floatA{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
@keyframes floatB{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(2deg)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes gentlePulse{0%,100%{opacity:.04}50%{opacity:.07}}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
const {useState,useEffect,useRef}=React;

/* ═══ PALETTE ═══ */
const C={
  bg:"#1A1614",bg2:"#211E1B",bg3:"#2A2622",
  gold:"#C4A35A",goldLight:"#D4B86E",goldDim:"#8A7340",
  cream:"#E8E0D4",creamDim:"#A89E90",
  wine:"#6B3A3A",wineLight:"#8B5A5A",
  forest:"#3A5A42",forestLight:"#5A7A62",
  plum:"#5A3A6B",plumLight:"#7A5A8B",
  sky:"#3A5A6B",skyLight:"#5A8AAB",
  amber:"#7A5A2A",
  border:"rgba(196,163,90,.12)",borderLight:"rgba(196,163,90,.2)",
};

/* ═══ DATA ═══ */
const CATEGORIES=[
  {id:"breathing",title:"Dýchání",subtitle:"Návrat k dechu",icon:"🌬️",color:C.goldLight,accent:C.gold,cardBg:"linear-gradient(145deg,#2A2418,#1E1C16)",sessions:[
    {id:1,title:"Ranní probuzení",duration:"8 min",desc:"Jemné dechové cvičení pro start dne",src:"audio/meditace/dychani/ranni-probuzeni.mp3"},
    {id:2,title:"Čtvercové dýchání",duration:"5 min",desc:"Technika 4-4-4-4 pro okamžitý klid",src:"audio/meditace/dychani/box-breathing.mp3"},
    {id:3,title:"Večerní uvolnění",duration:"12 min",desc:"Hluboký dech před spaním",src:"audio/meditace/dychani/vecerni-uvolneni.mp3"},
  ]},
  {id:"bodyscan",title:"Skenování těla",subtitle:"Cesta tělem",icon:"✨",color:C.forestLight,accent:C.forest,cardBg:"linear-gradient(145deg,#1C2A1E,#161E16)",sessions:[
    {id:4,title:"Rychlé skenování",duration:"6 min",desc:"Pozorností skrz celé tělo",src:"audio/meditace/body-scan/rychly-scan.mp3"},
    {id:5,title:"Hluboké uvolnění",duration:"20 min",desc:"Uvolnění každého svalu",src:"audio/meditace/body-scan/hluboke-uvolneni.mp3"},
    {id:6,title:"Jóga nidra",duration:"30 min",desc:"Jogínský spánek – regenerace",src:"audio/meditace/body-scan/joga-nidra.mp3"},
  ]},
  {id:"visual",title:"Vizualizace",subtitle:"Vnitřní krajiny",icon:"🏔️",color:C.plumLight,accent:C.plum,cardBg:"linear-gradient(145deg,#241C2A,#1C161E)",sessions:[
    {id:7,title:"Procházka lesem",duration:"15 min",desc:"Cesta tichým lesem",src:"audio/meditace/vizualizace/prochazka-lesem.mp3"},
    {id:8,title:"U moře",duration:"12 min",desc:"Zvuk vln a slaný vzduch",src:"audio/meditace/vizualizace/u-more.mp3"},
    {id:9,title:"Horský pramen",duration:"10 min",desc:"Čistá voda a ticho hor",src:"audio/meditace/vizualizace/horsky-pramen.mp3"},
  ]},
  {id:"gratitude",title:"Vděčnost",subtitle:"Otevřené srdce",icon:"💛",color:C.goldLight,accent:C.amber,cardBg:"linear-gradient(145deg,#2A2418,#1E1A14)",sessions:[
    {id:10,title:"Tři dobré věci",duration:"7 min",desc:"Co dobrého máme",src:"audio/meditace/vdecnost/tri-dobre-veci.mp3"},
    {id:11,title:"Laskavost k sobě",duration:"10 min",desc:"Mettá meditace",src:"audio/meditace/vdecnost/laskavost-k-sobe.mp3"},
    {id:12,title:"Propojení",duration:"12 min",desc:"Sounáležitost se světem",src:"audio/meditace/vdecnost/propojeni.mp3"},
  ]},
  {id:"sleep",title:"Usínání",subtitle:"Ke spánku",icon:"🌙",color:C.skyLight,accent:C.sky,cardBg:"linear-gradient(145deg,#1C222A,#16191E)",sessions:[
    {id:13,title:"Počítání hvězd",duration:"15 min",desc:"Jemné vedení do spánku",src:"audio/meditace/usinani/pocitani-hvezd.mp3"},
    {id:14,title:"Těžké tělo",duration:"20 min",desc:"Propadání do matrace",src:"audio/meditace/usinani/tezke-telo.mp3"},
    {id:15,title:"Noční déšť",duration:"25 min",desc:"Zvuky deště a tichý hlas",src:"audio/meditace/usinani/nocni-dest.mp3"},
  ]},
];

const TALES={
  2:[{id:101,title:"O řepě",duration:"4 min",icon:"🌱",src:"audio/pohadky/2roky/o-repe.mp3"},{id:102,title:"O kohoutkovi a slepičce",duration:"5 min",icon:"🐓",src:"audio/pohadky/2roky/o-kohoutkovi-a-slepicce.mp3"},{id:103,title:"O kočičce a pejskovi",duration:"5 min",icon:"🐱",src:"audio/pohadky/2roky/o-kocicce-a-pejskovi.mp3"},{id:104,title:"Jak šlo vajíčko na vandr",duration:"4 min",icon:"🥚",src:"audio/pohadky/2roky/jak-slo-vajicko-na-vandr.mp3"}],
  3:[{id:201,title:"O třech medvědech",duration:"7 min",icon:"🐻",src:"audio/pohadky/3roky/o-trech-medvedech.mp3"},{id:202,title:"O zlaté rybce",duration:"8 min",icon:"🐟",src:"audio/pohadky/3roky/o-zlate-rybce.mp3"},{id:203,title:"Palečka",duration:"6 min",icon:"👧",src:"audio/pohadky/3roky/palecka.mp3"},{id:204,title:"O perníkové chaloupce",duration:"9 min",icon:"🏠",src:"audio/pohadky/3roky/o-pernikove-chaloupce.mp3"},{id:205,title:"O veliké repě",duration:"6 min",icon:"🥕",src:"audio/pohadky/3roky/o-velike-repe.mp3"}],
  4:[{id:301,title:"Jak šel Honzík do světa",duration:"12 min",icon:"🌍",src:"audio/pohadky/4roky/jak-sel-honzik-do-sveta.mp3"},{id:302,title:"Zvířátka a loupežníci",duration:"11 min",icon:"🎵",src:"audio/pohadky/4roky/zviratka-a-loupeznici.mp3"},{id:303,title:"O Smolíčkovi",duration:"10 min",icon:"🦌",src:"audio/pohadky/4roky/o-smolickovi.mp3"},{id:304,title:"Budulínek",duration:"9 min",icon:"🏡",src:"audio/pohadky/4roky/budulink.mp3"},{id:305,title:"O neposlušných kůzlátkách",duration:"8 min",icon:"🐐",src:"audio/pohadky/4roky/o-neposlusnych-kuzlatkach.mp3"},{id:306,title:"O červené Karkulce",duration:"10 min",icon:"🧣",src:"audio/pohadky/4roky/o-cervene-karkulce.mp3"}],
};

/* ═══ HELPERS ═══ */
function A({children,i=0,d=0}){return <div style={{animation:`fadeUp .7s cubic-bezier(.16,1,.3,1) ${d+i*.07}s both`}}>{children}</div>;}

/* ═══ SVG LOGO — large & prominent ═══ */
function Logo(){
  const g=C.gold;
  return (
    <div style={{position:"relative",width:220,height:220,margin:"0 auto"}}>
      {/* glow behind */}
      <div style={{position:"absolute",inset:-40,borderRadius:"50%",background:`radial-gradient(circle,${g}10 0%,transparent 70%)`,animation:"breathe 6s ease-in-out infinite"}}/>
      <svg width="220" height="220" viewBox="0 0 200 200" style={{display:"block",position:"relative",zIndex:1}}>
        {/* outermost thin ring with ticks */}
        <g style={{animation:"spinSlow 80s linear infinite",transformOrigin:"100px 100px"}}>
          <circle cx="100" cy="100" r="96" fill="none" stroke={g} strokeWidth=".4" opacity=".15"/>
          {Array.from({length:36}).map((_,i)=>(
            <line key={i} x1="100" y1={i%3===0?"2":"6"} x2="100" y2={i%3===0?"12":"10"} stroke={g} strokeWidth={i%3===0?".8":".4"} opacity={i%3===0?".3":".15"} transform={`rotate(${i*10} 100 100)`}/>
          ))}
        </g>
        {/* second ring with ornamental dots */}
        <g style={{animation:"spinReverse 55s linear infinite",transformOrigin:"100px 100px"}}>
          <circle cx="100" cy="100" r="82" fill="none" stroke={g} strokeWidth=".5" opacity=".18"/>
          {Array.from({length:24}).map((_,i)=>{
            const a=i*Math.PI/12,r=82;
            return <g key={i}><circle cx={100+r*Math.cos(a)} cy={100+r*Math.sin(a)} r={i%3===0?"2":"1"} fill={g} opacity={i%3===0?".3":".15"}/></g>;
          })}
        </g>
        {/* third ring dashed */}
        <g style={{animation:"spinSlow 40s linear infinite",transformOrigin:"100px 100px"}}>
          <circle cx="100" cy="100" r="68" fill="none" stroke={g} strokeWidth=".5" opacity=".12" strokeDasharray="3 6"/>
        </g>
        {/* large lotus petals — outer */}
        <g opacity=".9">
          {Array.from({length:12}).map((_,i)=>(
            <path key={i} d="M100 42 Q112 70 100 100 Q88 70 100 42" fill="none" stroke={g} strokeWidth="1"
              transform={`rotate(${i*30} 100 100)`} opacity={.2+Math.sin(i*.5)*.15}/>
          ))}
        </g>
        {/* medium lotus petals */}
        <g opacity=".8">
          {Array.from({length:8}).map((_,i)=>(
            <path key={i} d="M100 55 Q110 77 100 100 Q90 77 100 55" fill={g} opacity=".06"
              transform={`rotate(${i*45} 100 100)`}/>
          ))}
          {Array.from({length:8}).map((_,i)=>(
            <path key={`s${i}`} d="M100 55 Q110 77 100 100 Q90 77 100 55" fill="none" stroke={g} strokeWidth=".8"
              transform={`rotate(${i*45} 100 100)`} opacity=".35"/>
          ))}
        </g>
        {/* inner small petals */}
        <g opacity=".6">
          {Array.from({length:8}).map((_,i)=>(
            <path key={i} d="M100 68 Q107 84 100 100 Q93 84 100 68" fill={g} opacity=".08"
              transform={`rotate(${i*45+22.5} 100 100)`}/>
          ))}
        </g>
        {/* innermost ring */}
        <circle cx="100" cy="100" r="22" fill="none" stroke={g} strokeWidth=".6" opacity=".25"/>
        <circle cx="100" cy="100" r="15" fill="none" stroke={g} strokeWidth=".5" opacity=".2" strokeDasharray="2 4" style={{animation:"spinReverse 20s linear infinite",transformOrigin:"100px 100px"}}/>
        {/* center jewel */}
        <circle cx="100" cy="100" r="8" fill="none" stroke={g} strokeWidth="1" opacity=".5"/>
        <circle cx="100" cy="100" r="4" fill={g} opacity=".6"/>
        <circle cx="100" cy="100" r="1.5" fill="#fff" opacity=".5"/>
        {/* breathing pulse */}
        <circle cx="100" cy="100" r="28" fill="none" stroke={g} strokeWidth=".4" opacity=".15" style={{animation:"breathe 5s ease-in-out infinite"}}/>
      </svg>
    </div>
  );
}

/* ═══ ORNAMENTAL CATEGORY ICONS ═══ */
function CatIcon({type,size=52,color=C.gold}){
  const s=size,h=s/2,v=`0 0 ${s} ${s}`;
  const icons={
    /* wind/breath spiral */
    breathing:(
      <svg width={s} height={s} viewBox={v}>
        <circle cx={h} cy={h} r={h-2} fill="none" stroke={color} strokeWidth=".7" opacity=".2"/>
        <circle cx={h} cy={h} r={h-8} fill="none" stroke={color} strokeWidth=".5" opacity=".15" strokeDasharray="2 4"/>
        <path d={`M${h} ${h-12} Q${h+10} ${h-4} ${h} ${h} Q${h-10} ${h+4} ${h} ${h+12}`} fill="none" stroke={color} strokeWidth="1.5" opacity=".6" strokeLinecap="round"/>
        <path d={`M${h-8} ${h-6} Q${h} ${h-14} ${h+8} ${h-6}`} fill="none" stroke={color} strokeWidth="1" opacity=".35" strokeLinecap="round"/>
        <path d={`M${h-8} ${h+6} Q${h} ${h+14} ${h+8} ${h+6}`} fill="none" stroke={color} strokeWidth="1" opacity=".35" strokeLinecap="round"/>
        <circle cx={h} cy={h} r="2" fill={color} opacity=".5"/>
      </svg>
    ),
    /* radiating figure */
    bodyscan:(
      <svg width={s} height={s} viewBox={v}>
        <circle cx={h} cy={h} r={h-2} fill="none" stroke={color} strokeWidth=".7" opacity=".2"/>
        {Array.from({length:8}).map((_,i)=>(
          <line key={i} x1={h} y1={h} x2={h+Math.cos(i*Math.PI/4)*(h-6)} y2={h+Math.sin(i*Math.PI/4)*(h-6)} stroke={color} strokeWidth=".5" opacity=".15"/>
        ))}
        <circle cx={h} cy={h-8} r="4" fill="none" stroke={color} strokeWidth="1" opacity=".5"/>
        <line x1={h} y1={h-4} x2={h} y2={h+10} stroke={color} strokeWidth="1.2" opacity=".5" strokeLinecap="round"/>
        <line x1={h} y1={h+2} x2={h-7} y2={h+12} stroke={color} strokeWidth="1" opacity=".4" strokeLinecap="round"/>
        <line x1={h} y1={h+2} x2={h+7} y2={h+12} stroke={color} strokeWidth="1" opacity=".4" strokeLinecap="round"/>
        <line x1={h} y1={h-2} x2={h-8} y2={h+4} stroke={color} strokeWidth="1" opacity=".4" strokeLinecap="round"/>
        <line x1={h} y1={h-2} x2={h+8} y2={h+4} stroke={color} strokeWidth="1" opacity=".4" strokeLinecap="round"/>
        {Array.from({length:3}).map((_,i)=>(
          <circle key={i} cx={h} cy={h} r={8+i*6} fill="none" stroke={color} strokeWidth=".4" opacity={.12-.02*i} strokeDasharray="1.5 3"/>
        ))}
      </svg>
    ),
    /* mountain landscape */
    visual:(
      <svg width={s} height={s} viewBox={v}>
        <circle cx={h} cy={h} r={h-2} fill="none" stroke={color} strokeWidth=".7" opacity=".2"/>
        <path d={`M${h-16} ${h+10} L${h-6} ${h-8} L${h+2} ${h+2} L${h+8} ${h-12} L${h+16} ${h+10}`} fill="none" stroke={color} strokeWidth="1.3" opacity=".55" strokeLinejoin="round" strokeLinecap="round"/>
        <circle cx={h+10} cy={h-10} r="3" fill="none" stroke={color} strokeWidth=".8" opacity=".35"/>
        <circle cx={h+10} cy={h-10} r="1" fill={color} opacity=".3"/>
        <line x1={h-18} y1={h+10} x2={h+18} y2={h+10} stroke={color} strokeWidth=".6" opacity=".2"/>
        {Array.from({length:5}).map((_,i)=>(
          <circle key={i} cx={h-14+i*7} cy={h+14} r=".8" fill={color} opacity=".2"/>
        ))}
      </svg>
    ),
    /* heart mandala */
    gratitude:(
      <svg width={s} height={s} viewBox={v}>
        <circle cx={h} cy={h} r={h-2} fill="none" stroke={color} strokeWidth=".7" opacity=".2"/>
        <circle cx={h} cy={h} r={h-8} fill="none" stroke={color} strokeWidth=".4" opacity=".12" strokeDasharray="2 4"/>
        <path d={`M${h} ${h+10} C${h-14} ${h} ${h-14} ${h-10} ${h} ${h-4} C${h+14} ${h-10} ${h+14} ${h} ${h} ${h+10}Z`} fill={color} opacity=".08"/>
        <path d={`M${h} ${h+10} C${h-14} ${h} ${h-14} ${h-10} ${h} ${h-4} C${h+14} ${h-10} ${h+14} ${h} ${h} ${h+10}Z`} fill="none" stroke={color} strokeWidth="1.2" opacity=".5"/>
        {Array.from({length:6}).map((_,i)=>(
          <circle key={i} cx={h+12*Math.cos(i*Math.PI/3-Math.PI/6)} cy={h+12*Math.sin(i*Math.PI/3-Math.PI/6)} r="1" fill={color} opacity=".25"/>
        ))}
      </svg>
    ),
    /* crescent moon */
    sleep:(
      <svg width={s} height={s} viewBox={v}>
        <circle cx={h} cy={h} r={h-2} fill="none" stroke={color} strokeWidth=".7" opacity=".2"/>
        <path d={`M${h+2} ${h-14} A12 12 0 1 0 ${h+2} ${h+14} A9 9 0 1 1 ${h+2} ${h-14}Z`} fill={color} opacity=".08"/>
        <path d={`M${h+2} ${h-14} A12 12 0 1 0 ${h+2} ${h+14} A9 9 0 1 1 ${h+2} ${h-14}Z`} fill="none" stroke={color} strokeWidth="1.2" opacity=".5"/>
        <circle cx={h+10} cy={h-10} r="1" fill={color} opacity=".35"/>
        <circle cx={h+14} cy={h-4} r=".7" fill={color} opacity=".25"/>
        <circle cx={h+12} cy={h+6} r="1.2" fill={color} opacity=".3"/>
        <circle cx={h} cy={h} r={h-8} fill="none" stroke={color} strokeWidth=".4" opacity=".1" strokeDasharray="1.5 3"/>
      </svg>
    ),
    /* lotus / meditation circle */
    meditation:(
      <svg width={s} height={s} viewBox={v}>
        <circle cx={h} cy={h} r={h-2} fill="none" stroke={color} strokeWidth=".7" opacity=".2"/>
        {Array.from({length:6}).map((_,i)=>(
          <path key={i} d={`M${h} ${h-10} Q${h+6} ${h-3} ${h} ${h+4} Q${h-6} ${h-3} ${h} ${h-10}`} fill="none" stroke={color} strokeWidth=".9"
            transform={`rotate(${i*60} ${h} ${h})`} opacity=".4"/>
        ))}
        <circle cx={h} cy={h} r="3" fill={color} opacity=".15"/>
        <circle cx={h} cy={h} r="1.5" fill={color} opacity=".4"/>
      </svg>
    ),
    /* moon + stars for fairy tales */
    tales:(
      <svg width={s} height={s} viewBox={v}>
        <circle cx={h} cy={h} r={h-2} fill="none" stroke={color} strokeWidth=".7" opacity=".2"/>
        <path d={`M${h-2} ${h-12} A10 10 0 1 0 ${h-2} ${h+12} A7.5 7.5 0 1 1 ${h-2} ${h-12}Z`} fill="none" stroke={color} strokeWidth="1.1" opacity=".5"/>
        <path d={`M${h-2} ${h-12} A10 10 0 1 0 ${h-2} ${h+12} A7.5 7.5 0 1 1 ${h-2} ${h-12}Z`} fill={color} opacity=".06"/>
        {[{x:h+10,y:h-8,r:1.5},{x:h+14,y:h,r:1},{x:h+8,y:h+8,r:1.2},{x:h+13,y:h+6,r:.7}].map((s,i)=>(
          <circle key={i} cx={s.x} cy={s.y} r={s.r} fill={color} opacity=".35"/>
        ))}
      </svg>
    ),
  };
  return icons[type]||null;
}

/* ═══ PATTERNED BACKGROUND ═══ */
function Background(){
  const patternSvg=encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80' viewBox='0 0 80 80'><circle cx='40' cy='40' r='1' fill='rgba(196,163,90,0.06)'/><circle cx='0' cy='0' r='1' fill='rgba(196,163,90,0.04)'/><circle cx='80' cy='0' r='1' fill='rgba(196,163,90,0.04)'/><circle cx='0' cy='80' r='1' fill='rgba(196,163,90,0.04)'/><circle cx='80' cy='80' r='1' fill='rgba(196,163,90,0.04)'/><path d='M40 0 L40 6 M40 74 L40 80 M0 40 L6 40 M74 40 L80 40' stroke='rgba(196,163,90,0.03)' stroke-width='0.5'/></svg>`);
  const mandalaSvg=encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400' viewBox='0 0 400 400'><circle cx='200' cy='200' r='180' fill='none' stroke='rgba(196,163,90,0.03)' stroke-width='0.5'/><circle cx='200' cy='200' r='140' fill='none' stroke='rgba(196,163,90,0.025)' stroke-width='0.5'/><circle cx='200' cy='200' r='100' fill='none' stroke='rgba(196,163,90,0.02)' stroke-width='0.5'/><circle cx='200' cy='200' r='60' fill='none' stroke='rgba(196,163,90,0.03)' stroke-width='0.5'/></svg>`);
  return (
    <div style={{position:"fixed",inset:0,zIndex:0,pointerEvents:"none",overflow:"hidden"}}>
      {/* base gradient */}
      <div style={{position:"absolute",inset:0,background:`linear-gradient(175deg, #1A1614 0%, #1E1814 20%, #1A1614 40%, #18161A 60%, #1A1614 80%, #1C1816 100%)`}}/>
      {/* dot pattern */}
      <div style={{position:"absolute",inset:0,backgroundImage:`url("data:image/svg+xml,${patternSvg}")`,backgroundSize:"80px 80px",animation:"gentlePulse 8s ease-in-out infinite"}}/>
      {/* large mandala center */}

/* ═══ PLAYER ═══ */
function Player({session,onClose}){
  const [on,setOn]=useState(false);
  const [prog,setProg]=useState(0);
  const aRef=useRef(null);
  const prevId=useRef(null);

  useEffect(()=>{const a=aRef.current;if(!a)return;const t=()=>{if(a.duration)setProg((a.currentTime/a.duration)*100);};const e=()=>{setOn(false);setProg(0);};a.addEventListener("timeupdate",t);a.addEventListener("ended",e);return()=>{a.removeEventListener("timeupdate",t);a.removeEventListener("ended",e);};},[session]);
  useEffect(()=>{if(session.id===prevId.current)return;prevId.current=session.id;setProg(0);const a=aRef.current;if(a&&session.src){a.load();a.play().then(()=>setOn(true)).catch(()=>setOn(false));}else{setOn(true);}},[session]);
  const toggle=()=>{const a=aRef.current;if(a&&a.src){if(on)a.pause();else a.play().catch(()=>{});setOn(!on);return;}setOn(!on);};
  const seek=e=>{const a=aRef.current;if(!a||!a.duration)return;const r=e.currentTarget.getBoundingClientRect();a.currentTime=((e.clientX-r.left)/r.width)*a.duration;};
  useEffect(()=>{if(session.src||!on)return;const iv=setInterval(()=>setProg(p=>p>=100?(setOn(false),0):p+.25),120);return()=>clearInterval(iv);},[on,session.src]);

  return (
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(26,22,20,.95)",backdropFilter:"blur(24px)",padding:"16px 28px",display:"flex",alignItems:"center",gap:16,zIndex:200,borderTop:`1px solid ${C.border}`,animation:"slideUp .35s cubic-bezier(.16,1,.3,1)"}}>
      {session.src&&<audio ref={aRef} src={session.src} preload="auto"/>}
      <button onClick={toggle} style={{width:52,height:52,borderRadius:"50%",border:`1.5px solid ${C.gold}`,background:"transparent",color:C.gold,fontSize:18,fontWeight:700,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"}}
        onMouseEnter={e=>{e.currentTarget.style.background=C.gold;e.currentTarget.style.color="#1A1614";}}
        onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color=C.gold;}}>
        {on?"⏸":"▶"}
      </button>
      <div style={{flex:1,minWidth:0}}>
        <div style={{color:C.cream,fontSize:15,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",letterSpacing:".02em"}}>{session.title}</div>
        <div onClick={seek} style={{marginTop:8,height:4,background:"rgba(196,163,90,.12)",borderRadius:3,cursor:"pointer",overflow:"hidden"}}>
          <div style={{width:`${prog}%`,height:"100%",background:`linear-gradient(90deg,${C.gold},${C.goldLight})`,borderRadius:3,transition:"width .12s linear"}}/>
        </div>
      </div>
      <button onClick={onClose} style={{background:"none",border:"none",color:C.creamDim,fontSize:26,cursor:"pointer",padding:4,lineHeight:1}}>✕</button>
    </div>
  );
}

        {/* ═══════ TALES AGE ═══════ */}
        {view==="tales"&&<>
          <A><SectionHead title="Pohádky na dobrou noc" subtitle="Kolik je vašemu malému posluchači?"/></A>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:18,maxWidth:480,margin:"0 auto"}}>
            {[2,3,4].map((a,i)=>{
              const cs=[C.gold,C.forestLight,C.plumLight];
              const ics=["🧸","🦋","🌟"];
              const bgs=["linear-gradient(155deg,#222018,#1C1A16)","linear-gradient(155deg,#1A221C,#161C18)","linear-gradient(155deg,#201A22,#1A161C)"];
              return <A key={a} i={i} d={.08}><button onClick={()=>go("fs",a)} style={{width:"100%",aspectRatio:"1/1.2",background:bgs[i],border:`1px solid ${cs[i]}20`,borderRadius:22,padding:20,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10,transition:"all .3s cubic-bezier(.16,1,.3,1)",position:"relative",overflow:"hidden"}}
                onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-6px)";e.currentTarget.style.borderColor=cs[i]+"50";e.currentTarget.style.boxShadow=`0 20px 48px ${cs[i]}12`;}}
                onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.borderColor=cs[i]+"20";e.currentTarget.style.boxShadow="";}}>
                <div style={{position:"absolute",top:10,left:10,width:14,height:14,borderTop:`1px solid ${cs[i]}20`,borderLeft:`1px solid ${cs[i]}20`}}/>
                <div style={{position:"absolute",bottom:10,right:10,width:14,height:14,borderBottom:`1px solid ${cs[i]}20`,borderRight:`1px solid ${cs[i]}20`}}/>
                <span style={{fontSize:42}}>{ics[i]}</span>
                <span style={{fontFamily:"'Cormorant',serif",fontSize:38,fontWeight:400,color:C.cream,fontStyle:"italic"}}>{a}</span>
                <span style={{fontSize:13,color:C.creamDim,fontWeight:500}}>roky</span>
              </button></A>;
            })}
          </div>
        </>}

        {/* ═══════ TALE SESSIONS ═══════ */}
        {view==="fs"&&age&&<>
          <A><div style={{textAlign:"center",marginBottom:40}}>
            <h2 style={{fontFamily:"'Cormorant',serif",fontSize:"clamp(30px,5vw,46px)",fontWeight:300,fontStyle:"italic",margin:0,color:C.cream}}>Pohádky pro {age}leté</h2>
            <p style={{color:C.creamDim,fontSize:14,marginTop:8}}>{TALES[age].length} pohádek k poslechu</p>
            <div style={{marginTop:16}}><Divider width={100}/></div>
          </div></A>
          <div style={{maxWidth:660,margin:"0 auto",display:"flex",flexDirection:"column",gap:12}}>
            {TALES[age].map((t,i)=>(
              <A key={t.id} i={i} d={.05}><div onClick={()=>setPlaying(t)} style={{background:playing?.id===t.id?"rgba(58,90,66,.08)":C.bg2,border:`1px solid ${playing?.id===t.id?C.forest+"30":C.border}`,borderRadius:16,padding:"22px 24px",cursor:"pointer",display:"flex",alignItems:"center",gap:18,transition:"all .25s"}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=C.forest+"30";e.currentTarget.style.transform="translateY(-2px)";}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor=playing?.id===t.id?C.forest+"30":C.border;e.currentTarget.style.transform="";}}>
                <span style={{fontSize:36}}>{t.icon}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:16,fontWeight:500,color:C.cream}}>{t.title}</div>
                  <div style={{fontSize:13,color:C.creamDim,marginTop:3}}>{t.duration}</div>
                </div>
                <DlBtn onClick={()=>setDlItem(t)}/>
              </div></A>
            ))}
          </div>
        </>}

      </div>
      {playing&&<Player session={playing} onClose={()=>setPlaying(null)}/>}
      {dlItem&&<Modal item={dlItem} onClose={()=>setDlItem(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
